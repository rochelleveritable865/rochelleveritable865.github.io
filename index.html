<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sistema Wallace Lira - Login</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            /* ── Tela de login ── */
            #loginScreen {
                background: white;
                border-radius: 10px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
                padding: 40px;
                max-width: 400px;
                width: 100%;
            }

            #loginScreen h1 {
                text-align: center;
                color: #333;
                margin-bottom: 30px;
                font-size: 24px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                color: #555;
                font-weight: 500;
            }

            .form-group input {
                width: 100%;
                padding: 12px;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-size: 14px;
            }

            .form-group input:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
            }

            button {
                width: 100%;
                padding: 12px;
                background: #667eea;
                color: white;
                border: none;
                border-radius: 5px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
            }

            button:hover:not(:disabled) {
                background: #5568d3;
            }

            button:disabled {
                background: #ccc;
                cursor: not-allowed;
            }

            .error-message {
                color: #e74c3c;
                font-size: 14px;
                margin-top: 15px;
                padding: 10px;
                background: #fadbd8;
                border-radius: 5px;
                display: none;
                text-align: center;
            }

            /* ── Tela do painel ── */
            #dashboardScreen {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                flex-direction: column;
                background: #f5f5f5;
            }

            #dashboardScreen header {
                background: #333;
                color: white;
                padding: 15px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-shrink: 0;
                height: 60px;
            }

            #dashboardScreen header .user-info {
                display: flex;
                gap: 15px;
                align-items: center;
            }

            #dashboardScreen header button {
                padding: 8px 16px;
                background: #e74c3c;
                font-size: 14px;
                width: auto;
            }

            #dashboardScreen header button:hover:not(:disabled) {
                background: #c0392b;
            }

            /* ── Iframe do painel ── */
            #erpFrame {
                width: 100%;
                flex: 1;
                border: none;
                display: block;
            }

            /* ── Overlay de carregamento ── */
            #loadingOverlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(255, 255, 255, 0.85);
                justify-content: center;
                align-items: center;
                flex-direction: column;
                gap: 16px;
                z-index: 9999;
                font-size: 18px;
                color: #555;
            }

            .spinner {
                width: 48px;
                height: 48px;
                border: 5px solid #ddd;
                border-top-color: #667eea;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <!-- ── Overlay de carregamento ── -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <span>Verificando sessão...</span>
        </div>

        <!-- ── Tela de login ── -->
        <div id="loginScreen">
            <h1>🔐 Sistema Wallace Lira</h1>
            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="seu@email.com"
                    autocomplete="username"
                />
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Sua senha"
                    autocomplete="current-password"
                />
            </div>
            <button id="loginBtn">Entrar</button>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <!-- ── Tela do painel (iframe) ── -->
        <div id="dashboardScreen">
            <header>
                <h1>📊 Sistema Wallace Lira</h1>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button id="logoutBtn">Sair</button>
                </div>
            </header>
            <!--
            O iframe carrega o painel completo como uma página independente.
            Assim todos os <script> do painel continuam funcionando:
            Chart.js, cálculos de datas, contadores, eventos, etc.
        -->
            <iframe
                id="erpFrame"
                src="about:blank"
                title="Painel Sistema Wallace Lira"
                allow="same-origin"
            >
            </iframe>
        </div>

        <script>
            // ── Configuração do Firebase ────────────────────────────────────────
            const FIREBASE_API_KEY = "AIzaSyCvXsD2v_AGx3vN3kM2z_uIllkRO-Lr2pc";
            const FIREBASE_BASE =
                "https://identitytoolkit.googleapis.com/v1/accounts";

            // ── Elementos do DOM ────────────────────────────────────────────────
            const loginScreen = document.getElementById("loginScreen");
            const dashboardScreen = document.getElementById("dashboardScreen");
            const loadingOverlay = document.getElementById("loadingOverlay");
            const erpFrame = document.getElementById("erpFrame");
            const userEmailEl = document.getElementById("userEmail");
            const errorMessageEl = document.getElementById("errorMessage");
            const loginBtn = document.getElementById("loginBtn");
            const logoutBtn = document.getElementById("logoutBtn");

            // ── Helpers de UI ───────────────────────────────────────────────────
            function showLoading(msg) {
                loadingOverlay.querySelector("span").textContent =
                    msg || "Aguarde...";
                loadingOverlay.style.display = "flex";
            }

            function hideLoading() {
                loadingOverlay.style.display = "none";
            }

            function showError(msg) {
                errorMessageEl.textContent = msg;
                errorMessageEl.style.display = "block";
            }

            function clearError() {
                errorMessageEl.style.display = "none";
            }

            function showLoginScreen() {
                loginScreen.style.display = "block";
                dashboardScreen.style.display = "none";
                document.body.style.background =
                    "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";
                clearError();
            }

            function showDashboard(email) {
                loginScreen.style.display = "none";
                dashboardScreen.style.display = "flex";
                document.body.style.background = "none";
                userEmailEl.textContent = "👤 " + email;

                // Carrega o painel no iframe (scripts funcionam normalmente)
                if (
                    erpFrame.src === "about:blank" ||
                    erpFrame.src === window.location.href + "about:blank"
                ) {
                    erpFrame.src = "Sistema_Wallace_Lira_Completo.html";
                }
            }

            // ── Autenticação Firebase (REST) ─────────────────────────────────
            function firebaseSignIn(email, password) {
                return fetch(
                    `${FIREBASE_BASE}:signInWithPassword?key=${FIREBASE_API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            email,
                            password,
                            returnSecureToken: true,
                        }),
                    },
                )
                    .then((r) => r.json())
                    .then((data) => {
                        if (data.error) throw new Error(data.error.message);
                        return data;
                    });
            }

            /**
             * Valida o idToken armazenado chamando accounts:lookup no Firebase.
             * Retorna o objeto do usuário se válido, ou lança erro se inválido/expirado.
             */
            function validateToken(idToken) {
                return fetch(
                    `${FIREBASE_BASE}:lookup?key=${FIREBASE_API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ idToken }),
                    },
                )
                    .then((r) => r.json())
                    .then((data) => {
                        if (
                            data.error ||
                            !data.users ||
                            data.users.length === 0
                        ) {
                            throw new Error("Token inválido");
                        }
                        return data.users[0];
                    });
            }

            // ── Ação: Login ───────────────────────────────────────────────────
            function login() {
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;

                clearError();

                if (!email || !password) {
                    showError("Preencha email e senha");
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = "Entrando...";

                firebaseSignIn(email, password)
                    .then((response) => {
                        localStorage.setItem("auth", JSON.stringify(response));
                        showDashboard(email);
                    })
                    .catch((error) => {
                        let msg = error.message || "Erro ao fazer login";
                        if (msg.includes("INVALID_LOGIN_CREDENTIALS"))
                            msg = "Email ou senha incorretos";
                        if (msg.includes("USER_DISABLED"))
                            msg = "Usuário desativado";
                        if (msg.includes("TOO_MANY_ATTEMPTS"))
                            msg = "Muitas tentativas. Tente mais tarde.";
                        showError(msg);
                    })
                    .finally(() => {
                        loginBtn.disabled = false;
                        loginBtn.textContent = "Entrar";
                    });
            }

            // ── Ação: Logout ──────────────────────────────────────────────────
            function logout() {
                // 1. Descarrega o iframe antes de voltar ao login
                erpFrame.src = "about:blank";

                // 2. Limpa a sessão
                localStorage.removeItem("auth");

                // 3. Volta à tela de login
                showLoginScreen();
            }

            // ── Eventos ───────────────────────────────────────────────────────
            loginBtn.addEventListener("click", login);
            logoutBtn.addEventListener("click", logout);

            document
                .getElementById("email")
                .addEventListener("keypress", (e) => {
                    if (e.key === "Enter") login();
                });
            document
                .getElementById("password")
                .addEventListener("keypress", (e) => {
                    if (e.key === "Enter") login();
                });

            // ── Inicialização: verificar sessão salva ────────────────────────
            window.addEventListener("load", () => {
                const stored = localStorage.getItem("auth");

                if (!stored) {
                    // Nenhuma sessão → mostra login
                    return;
                }

                let authData;
                try {
                    authData = JSON.parse(stored);
                } catch {
                    localStorage.removeItem("auth");
                    return;
                }

                const idToken = authData.idToken;
                if (!idToken) {
                    localStorage.removeItem("auth");
                    return;
                }

                // Valida o token no Firebase antes de abrir o painel
                showLoading("Verificando sessão...");

                validateToken(idToken)
                    .then((user) => {
                        const email = user.email || authData.email || "usuário";
                        hideLoading();
                        showDashboard(email);
                    })
                    .catch(() => {
                        // Token expirado ou inválido → remove e vai ao login
                        localStorage.removeItem("auth");
                        hideLoading();
                        showLoginScreen();
                    });
            });
        </script>
    </body>
</html>
